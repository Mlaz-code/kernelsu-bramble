name: Build KernelSU + SUSFS for bramble

on:
  workflow_dispatch:
    inputs:
      ksu_branch:
        description: "KernelSU branch (rsuntk fork)"
        required: true
        default: "main"
        type: string
      kernel_branch:
        description: "Kernel manifest branch"
        required: true
        default: "android-msm-redbull-4.19-android14-qpr3"
        type: string
      enable_susfs:
        description: "Enable SUSFS (kernel-4.19 branch)"
        required: true
        default: true
        type: boolean
      build_target:
        description: "Device (bramble=4a5G, redfin=Pixel5)"
        required: true
        default: "bramble"
        type: choice
        options:
          - bramble
          - redfin

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: false
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y repo git bc flex bison libssl-dev \
            build-essential zip unzip curl python3

      - name: Fetch kernel source
        run: |
          cd $HOME
          mkdir android-kernel && cd android-kernel
          repo init -u https://android.googlesource.com/kernel/manifest \
            -b ${{ inputs.kernel_branch }} --depth=1
          repo sync -c --no-tags --no-clone-bundle -j$(nproc)
          echo "Kernel source ready"

      - name: Integrate KernelSU (rsuntk non-GKI fork)
        run: |
          cd $HOME/android-kernel/private/msm-google

          # Use rsuntk's setup script — handles non-GKI integration automatically
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" \
            | bash -s ${{ inputs.ksu_branch }}

          echo "KernelSU version:"
          cat KernelSU/kernel/ksu.h 2>/dev/null | grep -E "KERNEL_SU_VERSION|KSU_VERSION" | head -3 || true
          echo "KernelSU directory:"
          ls KernelSU/kernel/ | head -10

      - name: Integrate SUSFS
        if: ${{ inputs.enable_susfs }}
        run: |
          cd $HOME/android-kernel/private/msm-google

          # Clone SUSFS for kernel 4.19
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b kernel-4.19 \
            || git clone https://github.com/kutemeikito/susfs4ksu.git -b kernel-4.19

          echo "=== SUSFS patch files ==="
          find susfs4ksu/kernel_patches -type f | sort

          # --- Step 1: Copy SUSFS source files into kernel tree ---
          cp -v susfs4ksu/kernel_patches/fs/susfs.c fs/ || true
          cp -v susfs4ksu/kernel_patches/fs/sus_su.c fs/ || true
          cp -rv susfs4ksu/kernel_patches/include/linux/susfs*.h include/linux/ || true
          cp -rv susfs4ksu/kernel_patches/include/linux/sus_su.h include/linux/ || true

          # --- Step 2: Apply KernelSU SUSFS patch MANUALLY ---
          # The stock 10_enable_susfs_for_ksu.patch targets tiann/KernelSU layout
          # which differs from rsuntk. We apply it with fuzz tolerance and fix rejects.
          cd KernelSU
          if patch -p1 --fuzz=3 --no-backup-if-mismatch < ../susfs4ksu/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch; then
            echo "KernelSU SUSFS patch applied cleanly"
          else
            echo "KernelSU SUSFS patch had rejects — applying manually"
            # List reject files for debugging
            find . -name "*.rej" -exec echo "REJECT: {}" \; -exec cat {} \;

            # Manual integration: add SUSFS includes and calls to ksu.c
            # This is the fallback when patches don't apply
            KSU_C="kernel/ksu.c"
            if [ -f "$KSU_C" ] && ! grep -q "susfs" "$KSU_C"; then
              # Add include at top
              sed -i '/#include/a #include <linux/susfs.h>' "$KSU_C" 2>/dev/null || true
            fi

            # Add SUSFS to Makefile
            MAKEFILE="kernel/Makefile"
            if [ -f "$MAKEFILE" ] && ! grep -q "susfs" "$MAKEFILE"; then
              echo "obj-\$(CONFIG_KSU_SUSFS) += susfs.o" >> "$MAKEFILE"
            fi

            # Clean up rejects
            find . -name "*.rej" -delete
          fi
          cd ..

          # --- Step 3: Apply kernel SUSFS patch ---
          if patch -p1 --fuzz=3 --no-backup-if-mismatch < susfs4ksu/kernel_patches/50_add_susfs_in_kernel-4.19.patch; then
            echo "Kernel SUSFS patch applied cleanly"
          else
            echo "Kernel SUSFS patch had rejects — applying critical parts manually"
            find . -name "*.rej" -exec echo "REJECT: {}" \; -exec cat {} \;

            # Ensure fs/Makefile includes susfs
            if ! grep -q "susfs" fs/Makefile; then
              echo "obj-\$(CONFIG_KSU_SUSFS) += susfs.o" >> fs/Makefile
            fi

            find . -name "*.rej" -delete
          fi

          echo "=== SUSFS integration complete ==="
          echo "Files in fs/:"
          ls -la fs/susfs* 2>/dev/null || echo "No susfs source files"
          echo "Headers:"
          ls -la include/linux/susfs* include/linux/sus_su* 2>/dev/null || echo "No susfs headers"

      - name: Configure kernel
        run: |
          cd $HOME/android-kernel/private/msm-google

          # Find defconfig
          DEFCONFIG=$(find arch/arm64/configs -name "*redbull*" | head -1)
          if [ -z "$DEFCONFIG" ]; then
            DEFCONFIG="arch/arm64/configs/b1c1_defconfig"
          fi
          echo "Using defconfig: $DEFCONFIG"

          # Enable KernelSU
          grep -q "CONFIG_KSU=y" "$DEFCONFIG" || echo "CONFIG_KSU=y" >> "$DEFCONFIG"

          # SUSFS configs (only if enabled)
          if [ "${{ inputs.enable_susfs }}" = "true" ]; then
            for cfg in CONFIG_KSU_SUSFS CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT \
                       CONFIG_KSU_SUSFS_SUS_PATH CONFIG_KSU_SUSFS_SUS_MOUNT \
                       CONFIG_KSU_SUSFS_SUS_KSTAT CONFIG_KSU_SUSFS_SUS_OVERLAYFS \
                       CONFIG_KSU_SUSFS_TRY_UMOUNT CONFIG_KSU_SUSFS_SPOOF_UNAME \
                       CONFIG_KSU_SUSFS_OPEN_REDIRECT; do
              grep -q "$cfg" "$DEFCONFIG" || echo "${cfg}=y" >> "$DEFCONFIG"
            done
          fi

          echo "=== KSU/SUSFS config entries ==="
          grep -E "CONFIG_KSU|CONFIG_KPROBES" "$DEFCONFIG" || true

      - name: Build kernel
        run: |
          cd $HOME/android-kernel

          # Build — the Google script handles toolchain
          BUILD_OUTPUT=""
          if ./build_redbull-gki.sh 2>&1 | tee /tmp/build.log | tail -20; then
            echo "Build script completed"
          else
            echo "Build script exited with error"
          fi

          # Check for output in various possible locations
          echo "=== Looking for kernel image ==="
          find out/ -name "Image*" -type f 2>/dev/null | head -5
          find out/ -name "boot*" -type f 2>/dev/null | head -5

          if [ -f "out/android-msm-pixel-4.19/dist/Image.lz4-dtb" ]; then
            echo "SUCCESS: Found Image.lz4-dtb"
            ls -la out/android-msm-pixel-4.19/dist/Image.lz4-dtb
          else
            echo "Looking in alternate paths..."
            find out/ -name "*.lz4*" -type f 2>/dev/null | head -5
            find out/ -name "Image*" -type f 2>/dev/null | head -5
            # Show last 50 lines of build log for debugging
            echo "=== Last 50 lines of build ==="
            tail -50 /tmp/build.log
            exit 1
          fi

      - name: Package AnyKernel3
        run: |
          cd $HOME/android-kernel

          # Find the kernel image
          KERNEL_IMG=$(find out/ -name "Image.lz4-dtb" -type f | head -1)
          if [ -z "$KERNEL_IMG" ]; then
            KERNEL_IMG=$(find out/ -name "Image*" -type f | head -1)
          fi
          echo "Using kernel image: $KERNEL_IMG"

          git clone https://github.com/osm0sis/AnyKernel3.git
          cd AnyKernel3
          sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
          sed -i 's!block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!block=auto;!g' anykernel.sh
          sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' anykernel.sh

          cp "$KERNEL_IMG" Image.lz4-dtb
          zip -r KernelSU-SUSFS-${{ inputs.build_target }}.zip . \
            -x ".git*" "README.md" "*.zip"

      - name: Upload AnyKernel3 zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: KernelSU-SUSFS-${{ inputs.build_target }}-AnyKernel3
          path: "${{ env.HOME }}/android-kernel/AnyKernel3/KernelSU-SUSFS-${{ inputs.build_target }}.zip"

      - name: Upload raw kernel image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Image.lz4-dtb
          path: "${{ env.HOME }}/android-kernel/out/**/Image.lz4-dtb"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
